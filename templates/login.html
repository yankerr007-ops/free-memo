{% extends 'base.html' %}
{% block title %}התחברות - MemoCraft{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-8">
    <div class="bg-slate-900/80 border border-indigo-500/20 backdrop-blur-xl p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-12 -right-12 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl"></div>
        
        <div class="text-center mb-8 relative">
            <h2 class="text-3xl font-extrabold text-white mb-2">ברוך שובך! 👋</h2>
            <p class="text-slate-400 text-sm">התחבר למערכת כדי לצפות ולנהל את המזכרים שלך</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="space-y-5 relative">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">שם משתמש</label>
                <input type="text" name="username" required placeholder="הכנס שם משתמש"
                    class="w-full bg-slate-800/60 border border-slate-700/80 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">סיסמה</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full bg-slate-800/60 border border-slate-700/80 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <button type="submit"
                class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/25 transition duration-200">
                התחבר למערכת
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400 relative">
            עדיין אין לך חשבון? 
            <a href="{{ url_for('register') }}" class="text-indigo-400 hover:text-indigo-300 font-medium underline underline-offset-4">צור חשבון חדש</a>
        </div>
    </div>
</div>
{% endblock %}
